version: "3.9"

services:
  # Database
  postgres:
    image: postgres:16-alpine
    container_name: algo-postgres
    environment:
      POSTGRES_USER: algotrader
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-algotrader_secret}
      POSTGRES_DB: algotrading
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d
    networks:
      - algo-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U algotrader"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis for caching and message broker
  redis:
    image: redis:7-alpine
    container_name: algo-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - algo-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # API Gateway
  api-gateway:
    build:
      context: ./services/api-gateway
      dockerfile: Dockerfile
    container_name: algo-api-gateway
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://algotrader:${POSTGRES_PASSWORD:-algotrader_secret}@postgres:5432/algotrading
      - REDIS_URL=redis://redis:6379
      - SECRET_KEY=${SECRET_KEY:-your-secret-key-change-in-production}
      - ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=30
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - algo-network
    restart: unless-stopped

  # Auth Service
  auth-service:
    build:
      context: ./services/auth-service
      dockerfile: Dockerfile
    container_name: algo-auth-service
    ports:
      - "8001:8001"
    environment:
      - DATABASE_URL=postgresql://algotrader:${POSTGRES_PASSWORD:-algotrader_secret}@postgres:5432/algotrading
      - SECRET_KEY=${SECRET_KEY:-your-secret-key-change-in-production}
      - ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=30
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - algo-network
    restart: unless-stopped

  # Market Data Service
  market-data-service:
    build:
      context: ./services/market-data-service
      dockerfile: Dockerfile
    container_name: algo-market-data
    ports:
      - "8002:8002"
    environment:
      - DATABASE_URL=postgresql://algotrader:${POSTGRES_PASSWORD:-algotrader_secret}@postgres:5432/algotrading
      - REDIS_URL=redis://redis:6379
      - ALPHA_VANTAGE_API_KEY=${ALPHA_VANTAGE_API_KEY}
      - POLYGON_API_KEY=${POLYGON_API_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - algo-network
    restart: unless-stopped

  # Strategy Service
  strategy-service:
    build:
      context: ./services/strategy-service
      dockerfile: Dockerfile
    container_name: algo-strategy-service
    ports:
      - "8003:8003"
    environment:
      - DATABASE_URL=postgresql://algotrader:${POSTGRES_PASSWORD:-algotrader_secret}@postgres:5432/algotrading
      - REDIS_URL=redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - algo-network
    restart: unless-stopped

  # Backtest Service
  backtest-service:
    build:
      context: ./services/backtest-service
      dockerfile: Dockerfile
    container_name: algo-backtest-service
    ports:
      - "8004:8004"
    environment:
      - DATABASE_URL=postgresql://algotrader:${POSTGRES_PASSWORD:-algotrader_secret}@postgres:5432/algotrading
      - REDIS_URL=redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - algo-network
    restart: unless-stopped

  # Execution Service
  execution-service:
    build:
      context: ./services/execution-service
      dockerfile: Dockerfile
    container_name: algo-execution-service
    ports:
      - "8005:8005"
    environment:
      - DATABASE_URL=postgresql://algotrader:${POSTGRES_PASSWORD:-algotrader_secret}@postgres:5432/algotrading
      - REDIS_URL=redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - algo-network
    restart: unless-stopped

  # Risk Management Service
  risk-service:
    build:
      context: ./services/risk-service
      dockerfile: Dockerfile
    container_name: algo-risk-service
    ports:
      - "8006:8006"
    environment:
      - DATABASE_URL=postgresql://algotrader:${POSTGRES_PASSWORD:-algotrader_secret}@postgres:5432/algotrading
      - REDIS_URL=redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - algo-network
    restart: unless-stopped

  # Celery Worker for background tasks
  celery-worker:
    build:
      context: ./services/celery-worker
      dockerfile: Dockerfile
    container_name: algo-celery-worker
    environment:
      - DATABASE_URL=postgresql://algotrader:${POSTGRES_PASSWORD:-algotrader_secret}@postgres:5432/algotrading
      - REDIS_URL=redis://redis:6379
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - algo-network
    restart: unless-stopped
    deploy:
      replicas: 2

  # Professional Trading Dashboard Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    container_name: algo-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - NEXT_PUBLIC_WS_URL=ws://localhost:8002
    depends_on:
      - api-gateway
    networks:
      - algo-network
    restart: unless-stopped

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: algo-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/ssl:/etc/nginx/ssl
    depends_on:
      - api-gateway
      - frontend
    networks:
      - algo-network
    restart: unless-stopped

  # Monitoring - Prometheus
  prometheus:
    image: prom/prometheus:latest
    container_name: algo-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    networks:
      - algo-network
    restart: unless-stopped

  # Monitoring - Grafana
  grafana:
    image: grafana/grafana:latest
    container_name: algo-grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources
    networks:
      - algo-network
    restart: unless-stopped

  # Logging - ELK Stack
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: algo-elasticsearch
    environment:
      - discovery.type=single-node
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    networks:
      - algo-network
    restart: unless-stopped

  logstash:
    image: docker.elastic.co/logstash/logstash:8.11.0
    container_name: algo-logstash
    volumes:
      - ./logging/logstash.conf:/usr/share/logstash/pipeline/logstash.conf
    ports:
      - "5044:5044"
    depends_on:
      - elasticsearch
    networks:
      - algo-network
    restart: unless-stopped

  kibana:
    image: docker.elastic.co/kibana/kibana:8.11.0
    container_name: algo-kibana
    ports:
      - "5601:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    depends_on:
      - elasticsearch
    networks:
      - algo-network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:
  elasticsearch_data:

networks:
  algo-network:
    driver: bridge
